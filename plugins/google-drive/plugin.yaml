name: google-drive
version: "0.1.0"
description: "Google Drive — file metadata, search, and export"

execution: persistent
handler: ./handler
credential_group: google

services:
  auth:
    type: oauth2
    token_file: token-drive.json
    credentials_file: client-credentials.json
    scopes:
      - https://www.googleapis.com/auth/drive
  http:
    base_url: https://www.googleapis.com
    allowed_domains:
      - www.googleapis.com

context_files:
  - context.md

tools:
  - name: drive_get_file_by_id
    access: read
    description: "Get file metadata by Drive file ID"
    params:
      file_id:
        type: string
        required: true
      fields:
        type: string
        description: "Comma-separated field mask (default: id,name,webViewLink,mimeType,owners,modifiedTime,size)"

  - name: drive_get_file_by_url
    access: read
    description: "Get file metadata from a Google Drive/Docs URL"
    params:
      url:
        type: string
        required: true
        description: "Google Drive/Docs URL"
      fields:
        type: string

  - name: drive_extract_and_get_from_text
    access: read
    description: "Extract Drive/Docs links from text and fetch metadata"
    params:
      text:
        type: string
        required: true
        description: "Text to scan for Google Drive URLs"
      max_files:
        type: integer
        default: 5
      fields:
        type: string

  - name: drive_export_google_doc_text
    access: read
    description: "Export a Google Doc as plain text (saves to file by default)"
    params:
      file_id:
        type: string
        required: true
      mime_type:
        type: string
        default: "text/plain"
      save_to_file:
        type: boolean
        default: true
        description: "Save to local file (default: true)"
      output_path:
        type: string
        description: "Custom output path"

  - name: drive_export_google_sheet_csv
    access: read
    description: "Export first worksheet of a Google Sheet as CSV (saves to file by default)"
    params:
      file_id:
        type: string
        required: true
      save_to_file:
        type: boolean
        default: true
        description: "Save to local file (default: true)"
      output_path:
        type: string
        description: "Custom output path"

  - name: drive_export_slides_pdf
    access: read
    description: "Export Google Slides as PDF (base64 encoded)"
    params:
      file_id:
        type: string
        required: true

  - name: drive_export_google_doc_markdown
    access: read
    visibility: primary
    description: "Export a Google Doc as text and save locally"
    params:
      file_id_or_url:
        type: string
        required: true
        description: "File ID or Google Docs URL"
      save_to_file:
        type: boolean
        default: true
        description: "Save to local file (default: true)"
      output_path:
        type: string
        description: "Custom output path (default: wtmcp/google-drive/<title>.md)"

  - name: drive_search_files
    access: read
    description: "Search Drive using a raw files.list query"
    params:
      query:
        type: string
        required: true
        description: "Drive q expression (e.g. \"name contains 'design'\")"
      page_size:
        type: integer
        default: 25
      order_by:
        type: string
        default: "modifiedTime desc"
      fields:
        type: string

  - name: drive_search_text
    access: read
    visibility: primary
    description: "Search Drive by text with optional filters"
    params:
      text:
        type: string
        required: true
        description: "Text to search in file names and content"
      page_size:
        type: integer
        default: 25
      in_name_only:
        type: boolean
        default: false
      mime_types:
        type: array
        description: "Filter by MIME types"
      owners:
        type: array
        description: "Filter by owners (e.g. ['me'])"
      include_trashed:
        type: boolean
        default: false
      order_by:
        type: string
        default: "modifiedTime desc"

  - name: drive_create_folder
    access: write
    description: "Create a folder in Google Drive. Requires re-authorization if the current token has read-only scope."
    params:
      name:
        type: string
        required: true
        description: "Folder name"
      parent_folder_id:
        type: string
        description: "Parent folder ID to create the folder in"
      dry_run:
        type: boolean
        default: true
        description: "Preview without creating"

  - name: drive_upload_file
    access: write
    description: "Upload a local file to Google Drive. Requires re-authorization if the current token has read-only scope."
    params:
      file_path:
        type: string
        required: true
        description: "Path to the local file to upload"
      name:
        type: string
        description: "File name in Drive (default: local file basename)"
      mime_type:
        type: string
        description: "MIME type (auto-detected if omitted)"
      parent_folder_id:
        type: string
        description: "Parent folder ID to upload into"
      dry_run:
        type: boolean
        default: true
        description: "Preview without uploading"

  - name: drive_rename_file
    access: write
    description: "Rename or move a file in Google Drive. Requires re-authorization if the current token has read-only scope."
    params:
      file_id:
        type: string
        required: true
      name:
        type: string
        description: "New file name"
      add_parents:
        type: string
        description: "Comma-separated folder IDs to add as parents"
      remove_parents:
        type: string
        description: "Comma-separated folder IDs to remove as parents"
      dry_run:
        type: boolean
        default: true
        description: "Preview without applying"

  - name: drive_copy_file
    access: write
    description: "Copy a file in Google Drive. Requires re-authorization if the current token has read-only scope."
    params:
      file_id:
        type: string
        required: true
        description: "ID of the file to copy"
      name:
        type: string
        description: "Name for the copy (default: 'Copy of <original>')"
      parent_folder_id:
        type: string
        description: "Parent folder ID for the copy"
      dry_run:
        type: boolean
        default: true
        description: "Preview without copying"

  - name: drive_delete_file
    access: write
    description: "Move a file to trash in Google Drive (recoverable). Requires re-authorization if the current token has read-only scope."
    params:
      file_id:
        type: string
        required: true
        description: "ID of the file to trash"
      dry_run:
        type: boolean
        default: true
        description: "Preview without trashing"
