name: testing-farm
version: "0.1.0"
description: "Testing Farm — test execution and system reservation"

execution: persistent
handler: ./handler.py
credential_group: testing-farm

context_files:
  - context.md

services:
  auth:
    type: bearer
    token: "${TESTING_FARM_API_TOKEN}"
  http:
    base_url: "${TF_API_URL:-https://api.testing-farm.io}"
    allowed_domains:
      - api.testing-farm.io
      - api.dev.testing-farm.io
      - artifacts.osci.redhat.com
      - artifacts.dev.testing-farm.io
  cache:
    enabled: true
    namespace: testing-farm
    default_ttl: 60

env:
  - TESTING_FARM_API_TOKEN
  - TF_API_URL
  - TF_SSH_KEY_PATH

config:
  api_url: "${TF_API_URL:-https://api.testing-farm.io}"
  ssh_key_path: "${TF_SSH_KEY_PATH}"

tools:
  # --- Read tools ---

  - name: testing_farm_about
    access: read
    description: >
      Get Testing Farm API version and metadata. Useful to verify
      connectivity and check the API version.
    params: {}

  - name: testing_farm_whoami
    access: read
    description: >
      Get info about the authenticated token/user. Returns token
      owner details and permissions.
    params: {}

  - name: testing_farm_list_requests
    access: read
    visibility: primary
    description: >
      List test requests with optional filters. Returns request ID,
      state, result, compose, arch, and created time.
    params:
      state:
        type: string
        description: "Filter by state (new, queued, running, complete, error)"
      limit:
        type: integer
        default: 10
        description: "Maximum number of results (1-100)"
      created_after:
        type: string
        description: "ISO date filter (e.g. 2025-01-01)"

  - name: testing_farm_get_request
    access: read
    visibility: primary
    description: >
      Get detailed status of a test request. Returns state, result,
      environments, artifacts URL, and stage details.
    params:
      request_id:
        type: string
        required: true
        description: "Request ID (UUID)"

  - name: testing_farm_list_composes
    access: read
    description: >
      List available OS composes for the ranch. Returns compose names
      grouped by OS family. Use this to discover valid compose names
      before reserving or submitting tests.
    params: {}

  - name: testing_farm_list_reservations
    access: read
    description: >
      List running reservations. Filters requests for the
      /testing-farm/reserve test plan. Returns request ID, compose,
      arch, duration, created time, and state. Does NOT extract SSH
      info — use testing_farm_get_ssh for that.
    params:
      limit:
        type: integer
        default: 20
        description: "Maximum number of results"

  - name: testing_farm_get_ssh
    access: read
    description: >
      Extract SSH connection info for a reservation. Fetches
      results.xml from artifacts, parses console logs to find the
      IP address. Returns IP, SSH command, and request details.
    params:
      request_id:
        type: string
        required: true
        description: "Request ID (UUID) of a reservation"

  - name: testing_farm_get_results
    access: read
    description: >
      Get test results summary (xunit) for a completed request.
      Returns test names, results, and duration. Returns a status
      message if the request is not yet complete.
    params:
      request_id:
        type: string
        required: true
        description: "Request ID (UUID)"

  - name: testing_farm_get_logs
    access: read
    description: >
      Get pipeline log URL and console log URL for a request.
      Returns direct URLs to the logs.
    params:
      request_id:
        type: string
        required: true
        description: "Request ID (UUID)"

  # --- Write tools ---

  - name: testing_farm_reserve
    access: write
    visibility: primary
    description: >
      Reserve a system on Testing Farm. Injects SSH public keys
      automatically from ~/.ssh/id_*.pub. Defaults to dry_run=true
      which returns a preview of the request payload.
    params:
      compose:
        type: string
        required: true
        description: "OS compose (e.g. Fedora-Rawhide, RHEL-9.3.0-Nightly)"
      arch:
        type: string
        required: true
        description: "Architecture (x86_64, s390x, aarch64, ppc64le)"
      duration:
        type: integer
        default: 60
        description: "Reservation duration in minutes (max 720)"
      hardware:
        type: object
        description: "Hardware specs (cpu, memory, disk). Optional."
      ssh_keys:
        type: string
        description: "Additional SSH public keys (one per line). Auto-discovered keys are always included."
      dry_run:
        type: boolean
        default: true

  - name: testing_farm_submit_test
    access: write
    visibility: primary
    description: >
      Submit a test request to Testing Farm. Defaults to dry_run=true
      which returns a preview of the request payload.
    params:
      git_url:
        type: string
        required: true
        description: "Git repository containing TMT tests"
      git_ref:
        type: string
        default: "main"
        description: "Git branch or ref"
      plan_name:
        type: string
        description: "TMT plan name (--name filter)"
      compose:
        type: string
        required: true
        description: "OS compose (e.g. Fedora-Rawhide)"
      arch:
        type: string
        required: true
        description: "Architecture (x86_64, s390x, aarch64, ppc64le)"
      artifacts:
        type: array
        description: "Artifacts to install [{id, type, packages}]"
        items:
          type: object
      env_vars:
        type: object
        description: "Environment variables for the test"
      timeout:
        type: integer
        description: "Timeout in minutes (default 720)"
      dry_run:
        type: boolean
        default: true

  - name: testing_farm_cancel
    access: write
    description: >
      Cancel a test request or release a reserved system. This
      deletes the request from Testing Farm.
    params:
      request_id:
        type: string
        required: true
        description: "Request ID (UUID)"

setup:
  credentials:
    TESTING_FARM_API_TOKEN:
      description: "Testing Farm API token"
      help_url: "https://docs.testing-farm.io/Testing%20Farm/0.1/onboarding.html"
      instructions: >
        Request a Testing Farm API token from the Testing Farm team
        or generate one from the Testing Farm dashboard.
      secret: true
    TF_API_URL:
      description: "Testing Farm API URL (default: public ranch)"
      example: "https://api.testing-farm.io"
      secret: false
    TF_SSH_KEY_PATH:
      description: "Path to SSH public key for reservations (auto-detected from ~/.ssh/)"
      example: "/home/user/.ssh/id_ed25519.pub"
      secret: false
  validation_tool: testing_farm_about
  post_setup_message: "Restart the MCP server for changes to take effect."

enabled: true
priority: 50
